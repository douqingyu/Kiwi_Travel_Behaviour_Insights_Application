<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/password.js') }}"></script>
    <title>{% block title %}{% endblock %}</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons (for toolbar icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="bg-body-secondary">

<header>
    {% block header %}{% endblock %}
</header>
<div class="position-fixed top-50 start-50 translate-middle p-3">
    {% for message in get_flashed_messages(with_categories=true) %}
        <div class="toast align-items-center bg-white border-0 flash {% if message[0] == 'error' %}text-danger border-danger{% elif message[0] == 'success' %}text-success border-success{% else %}text-black border-black{% endif %}" role="alert"
             aria-live="assertive" aria-atomic="true" data-bs-autohide="true">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message[1] }}
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% block content %}{% endblock %}

<!-- JavaScript Bundle with Popper -->
<script>
    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (() => {
        'use strict'

        // get all forms
        const forms = document.querySelectorAll('form')

        // validate form on input
        forms.forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            })
        })
    })()

    // show toast messages
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll('.toast').forEach(toastEl => {
            let toast = new bootstrap.Toast(toastEl, {delay: 3000});
            toast.show();
        });
    });

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
