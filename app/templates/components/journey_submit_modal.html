<div class="modal fade" id="journeySubmitModal" tabindex="-1" aria-labelledby="journeySubmitModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-black text-white border-0 rounded-top-4 px-4">
                <h5 class="modal-title" id="journeySubmitModalLabel">Add New Journey</h5>
            </div>
            <div class="modal-body border-0 p-4">
                <form id="journeyAddForm">
                    <div class="mb-3">
                        <label for="journeyTitle" class="form-label text-secondary">Title <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control rounded-3 border-0 bg-body-secondary" id="journeyTitle" name="journeyTitle"
                               maxlength="255" required>
                        <div class="invalid-feedback">Please enter a title</div>
                    </div>
                    <div class="mb-3">
                        <label for="journeyDescription" class="form-label text-secondary">Description <span
                                class="text-danger">*</span></label>
                        <textarea class="form-control rounded-3 border-0 bg-body-secondary" id="journeyDescription" name="journeyDescription"
                                  rows="3" required></textarea>
                        <div class="invalid-feedback">Please enter a description</div>
                    </div>
                    <div class="mb-3">
                        <label for="startDate" class="form-label text-secondary">Start Date <span
                                class="text-danger">*</span></label>
                        <input type="date" class="form-control rounded-3 border-0 bg-body-secondary" id="startDate" name="startDate" required 
                               placeholder="dd/mm/yyyy">
                        <div class="invalid-feedback">Please select a start date</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Journey Cover</label>
                        <div class="w-100">
                            <div id="imageUploadArea"
                                 class="image-upload-area d-flex cursor-pointer align-items-center justify-content-center w-100 rounded-4 border border-secondary"
                                 style="aspect-ratio: 1; border-width: 2px !important; border-style: dashed !important;">
                                <input type="file" class="d-none" id="journeyImage" name="journey_image"
                                       accept="image/*">
                                <div class="text-center text-secondary">
                                    <i class="bi bi-plus-circle-fill fs-1 mb-2 d-block text-secondary"></i>
                                    <span>Click to upload image</span>
                                </div>
                            </div>
                            <div id="imagePreview" class="d-none">
                                <div class="position-relative" style="aspect-ratio: 1;">
                                    <img id="previewImage" src="" alt="Preview"
                                         class="img-fluid rounded-4 w-100 h-100" style="object-fit: cover;">
                                    <button type="button" id="clearImageBtn"
                                            class="btn position-absolute top-0 end-0 m-2 border-0 fs-6 rounded-5 d-flex align-items-center justify-content-center"
                                            style="width: 32px; height: 32px; background: rgba(90,90,90,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.2);"
                                            data-bs-toggle="tooltip"
                                            data-bs-placement="left"
                                            title="Remove">
                                        <i class="bi bi-x-lg text-white"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% if session.get('can_share') %}
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="isPublic" name="is_public">
                                <label class="form-check-label text-secondary" for="isPublic">
                                    Make this journey public
                                </label>
                            </div>
                        </div>
                    {% endif %}
                </form>
            </div>
            <div class="modal-footer border-0 p-4">
                <button type="button" class="btn rounded-5 px-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="journeySubmitBtn" class="btn btn-dark rounded-5 px-3" disabled>Submit</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const journeyForm = document.getElementById('journeyAddForm');
        const submitBtn = document.getElementById('journeySubmitBtn');
        const modal = document.getElementById('journeySubmitModal');
        const startDateInput = document.getElementById('startDate');
        // Add NZ date format display
        if (startDateInput) {
            // Set date input control to accept dd/mm/yyyy format
            startDateInput.addEventListener('blur', function(e) {
                const dateValue = e.target.value;
                if (dateValue && dateValue.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                    // Convert dd/mm/yyyy to yyyy-mm-dd
                    const [day, month, year] = dateValue.split('/');
                    e.target.value = `${year}-${month}-${day}`;
                }
            });
        }
        // add isSubmitting status
        let isSubmitting = false; 

        // Handle images upload and preview
        const imageUploadArea = document.getElementById('imageUploadArea');
        const fileInput = document.getElementById('journeyImage');
        const previewDiv = document.getElementById('imagePreview');
        const previewImage = document.getElementById('previewImage');

        imageUploadArea.addEventListener('click', function () {
            fileInput.click();
        });

        fileInput.addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // Check file type
            const allowedTypes = ['image/jpg', 'image/jpeg', 'image/png'];
            if (!allowedTypes.includes(file.type)) {
                showMessage('Please upload a .jpg, .jpeg, or .png file', 'error');
                return;
            }

            // Check file size (2MB limit)
            if (file.size > 2 * 1024 * 1024) {
                showMessage('File size must be less than 2MB', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('{{ url_for("upload_journey_photo") }}', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                if (data.success && data.filename) {
                    previewImage.src = `/static/file/uploads/${data.filename}`;
                    previewDiv.classList.remove('d-none');
                    imageUploadArea.classList.add('d-none');
                    validateAllFields();
                } else {
                    showMessage(data.error || 'Failed to upload images', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showMessage('Failed to upload images: ' + error.message, 'error');
            }
        });

        // Handle clear images button click event
        document.getElementById('clearImageBtn').addEventListener('click', function () {
            previewImage.src = '';
            previewDiv.classList.add('d-none');
            imageUploadArea.classList.remove('d-none');
            fileInput.value = '';
            validateAllFields();
        });

        // forbid default submission
        journeyForm.addEventListener('submit', function (e) {
            e.preventDefault();
        });

        // Reset form state
        function resetModalState() {
            document.getElementById('journeyTitle').value = '';
            document.getElementById('journeyDescription').value = '';
            document.getElementById('startDate').value = '';
            const isPublicCheckbox = document.getElementById('isPublic');
            if (isPublicCheckbox) {
                isPublicCheckbox.checked = false;
            }
            submitBtn.disabled = true;
            isSubmitting = false;  // reset isSubmitting

            // Reset images upload
            const previewDiv = document.getElementById('imagePreview');
            const previewImage = document.getElementById('previewImage');
            const imageUploadArea = document.getElementById('imageUploadArea');
            const fileInput = document.getElementById('journeyImage');

            previewImage.src = '';
            previewDiv.classList.add('d-none');
            imageUploadArea.classList.remove('d-none');
            fileInput.value = '';
        }

        // Listen for modal hide event
        modal.addEventListener('hidden.bs.modal', function () {
            resetModalState();
        });

        // Handle form input events
        function handleFormInput() {
            submitBtn.disabled = !journeyForm.checkValidity();
        }

        journeyForm.addEventListener('input', handleFormInput);

        // Handle submit event
        submitBtn.addEventListener('click', async function (e) {
            e.preventDefault(); 

            if (!journeyForm.checkValidity()) {
                showMessage('Please fill out the form correctly.', 'error');
                return;
            }

            if (isSubmitting) {
                return;
            }

            try {
                // set isSubmitting and disable submit button
                isSubmitting = true;  
                submitBtn.disabled = true;

                const data = {
                    title: document.getElementById('journeyTitle').value,
                    description: document.getElementById('journeyDescription').value,
                    start_date: document.getElementById('startDate').value,
                    is_public: document.getElementById('isPublic') ? document.getElementById('isPublic').checked : false,
                    photo_url: previewImage.src && previewImage.src.includes('/static/file/uploads/') ? previewImage.src.split('/').pop() : null
                };
                const res = await apiRequest('{{ url_for("journey_submit") }}', 'POST', data);
                window.location.href = `/journey/detail/${res.journey_id}`;
            } catch (error) {
                isSubmitting = false;  // reset isSubmitting
                submitBtn.disabled = false;  // enable submit button
                showMessage(error.message, 'error');
            }
        });

        // Add real-time validation for all required fields
        const journeyTitle = document.getElementById('journeyTitle');
        const journeyDescription = document.getElementById('journeyDescription');
        const startDate = document.getElementById('startDate');

        journeyTitle.addEventListener('input', validateAllFields);
        journeyDescription.addEventListener('input', validateAllFields);
        startDate.addEventListener('input', validateAllFields);

        // Function to validate all fields
        function validateAllFields() {
            const requiredFields = journeyForm.querySelectorAll('[required]');
            let isValid = true;

            requiredFields.forEach(field => {
                const feedback = field.nextElementSibling;
                if (field.value.trim() === '') {
                    field.classList.add('is-invalid');
                    feedback.style.display = 'block';
                    isValid = false;
                } else {
                    field.classList.remove('is-invalid');
                    feedback.style.display = 'none';
                }
            });

            submitBtn.disabled = !isValid;
        }
    });
</script>

<style>
    .image-upload-area:hover {
        border-color: var(--bs-black);
        background-color: var(--bs-dark-bg-subtle);
    }
</style>
