<div class="modal fade" id="avatarDeleteModal" tabindex="-1" aria-labelledby="avatarDeleteModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-danger text-white border-0 rounded-top-4 px-4">
                <h5 class="modal-title" id="avatarDeleteModalLabel">Confirm Delete</h5>
            </div>
            <div class="modal-body border-0 p-4">
                <p>Are you sure you want to delete your avatar?</p>
            </div>
            <div class="modal-footer border-0 p-4">
                <button type="button" class="btn rounded-5 px-3" data-bs-dismiss="modal">Cancel</button>
                <form action="{{ url_for('delete_avatar') }}" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-danger rounded-5 px-3">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
