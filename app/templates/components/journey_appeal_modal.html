<!-- Appeal Modal -->
<div class="modal fade" id="journeyAppealModal{{ journey_id }}" tabindex="-1" aria-labelledby="journeyAppealModalLabel{{ journey_id }}" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-warning text-white border-0 rounded-top-4 px-4">
                <h5 class="modal-title" id="journeyAppealModalLabel{{ journey_id }}">Appeal Hidden Status</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body border-0 p-4">
                <form id="journeyAppealForm{{ journey_id }}" method="POST" action="{{ url_for('create_journey_appeal') }}">
                    <input type="hidden" name="journey_id" value="{{ journey_id }}">
                    <div class="mb-3">
                        <label for="appeal_content{{ journey_id }}" class="form-label text-secondary">Appeal Content <span class="text-danger">*</span></label>
                        <textarea class="form-control rounded-3 border-0 bg-body-secondary" 
                                id="appeal_content{{ journey_id }}" 
                                name="content" 
                                rows="4" 
                                placeholder="Please explain why you think this journey should be unhidden"
                                required></textarea>
                    </div>
                    <div class="modal-footer border-0 p-0">
                        <button type="button" class="btn rounded-5 px-3" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning rounded-5 px-3" id="submitAppealBtn{{ journey_id }}" disabled>Submit Appeal</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('journeyAppealForm{{ journey_id }}');
    const submitBtn = document.getElementById('submitAppealBtn{{ journey_id }}');
    const contentTextarea = document.getElementById('appeal_content{{ journey_id }}');
    const modal = document.getElementById('journeyAppealModal{{ journey_id }}');

    modal.addEventListener('hide.bs.modal', function(e) {
        const isCloseButton = e.target.classList.contains('btn-close') || e.target.closest('.btn-close');
        const isCancelButton = e.target.classList.contains('btn') && e.target.textContent.trim() === 'Cancel';
        
        if (!isCloseButton && !isCancelButton) {
            e.preventDefault();
        }
    });

    modal.querySelector('.modal-content').addEventListener('click', function(e) {
        e.stopPropagation();
    });

    contentTextarea.addEventListener('input', function() {
        submitBtn.disabled = !this.value.trim();
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const content = contentTextarea.value.trim();
        if (!content) {
            showMessage('Please provide appeal content', 'error');
            return;
        }

        try {
            const formData = new FormData(form);
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            if (response.ok && data.success) {
                const bsModal = bootstrap.Modal.getInstance(modal);
                if (bsModal) {
                    bsModal.hide();
                }
                showMessage('Your appeal has been submitted successfully', 'success');
                setTimeout(() => { window.location.reload(); }, 600);
            } else {
                showMessage(data.error || data.message || 'Failed to submit appeal', 'error');
            }
        } catch (error) {
            showMessage('Network error or server error', 'error');
        }
    });
});
</script>
