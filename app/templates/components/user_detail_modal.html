<!-- User Detail Modal -->
<div class="modal fade" id="userDetailModal" tabindex="-1" aria-labelledby="userDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-black text-white border-0 rounded-top-4">
                <div id="userDetailModalAvatarContainer" class="d-flex justify-content-center w-100"></div>
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-2"
                        data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Tab Navigation -->
                <ul class="nav nav-tabs mb-3" id="userDetailTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile"
                                type="button" role="tab">Profile
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="subscription-tab" data-bs-toggle="tab"
                                data-bs-target="#subscription" type="button" role="tab">Subscription History
                        </button>
                    </li>
                </ul>
                <div class="tab-content" id="userDetailTabsContent">
                    <!-- Profile Tab -->
                    <div class="tab-pane fade show active" id="profile" role="tabpanel">
                        <div class="d-flex flex-column align-items-center px-5">
                            <div class="d-flex">
                                <h3 id="userDetailModalFirstName" class="me-2"></h3>
                                <h3 id="userDetailModalLastName"></h3>
                            </div>
                            <div class="m-2">
                                <div class="d-flex align-items-start w-100 text-start">
                                    <i class="bi bi-person me-2"></i> <span id="userDetailModalUsername">Username</span>
                                </div>
                                <div class="d-flex align-items-start w-100 text-start">
                                    <i class="bi bi-envelope me-2"></i> <span id="userDetailModalEmail">Email</span>
                                </div>
                                <div class="d-flex align-items-start w-100 text-start">
                                    <i class="bi bi-geo-alt me-2"></i> <span
                                        id="userDetailModalLocation">Location</span>
                                </div>
                                <div class="d-flex align-items-start w-100 text-start">
                                    <i class="bi bi-info-circle me-2"></i> <span id="userDetailModalDescription">Description</span>
                                </div>
                            </div>
                            <div class="text-end">
                                <span id="userDetailModalRole" class="badge"></span>
                                <span id="userDetailModalStatus" class="badge"></span>
                            </div>
                        </div>
                    </div>
                    <!-- Subscription History Tab -->
                    <div class="tab-pane fade" id="subscription" role="tabpanel">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                <tr>
                                    <th>Plan</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Amount</th>
                                    <th>GST</th>
                                    <th>Billing Country</th>
                                    <th>Type</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody id="subscriptionHistoryTable">
                                <!-- Subscription history will be rendered here by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 引入订阅详情模态框组件 -->
{% include 'components/subscription_detail_modal.html' %}

<script>
    // User detail modal logic
    document.addEventListener('DOMContentLoaded', function () {
        const userDetailModal = document.getElementById('userDetailModal');
        let currentUserId = null;
        if (userDetailModal) {
            userDetailModal.addEventListener('show.bs.modal', async function (event) {
                const button = event.relatedTarget;
                const userId = button.getAttribute('data-user-id');
                currentUserId = userId;
                if (!userId) return;
                const res = await apiRequest('/user/detail', 'POST', {user_id: userId});
                if (res.success) {
                    const user = res.user;
                    document.getElementById('userDetailModalUsername').textContent = user.username || '';
                    document.getElementById('userDetailModalFirstName').textContent = user.first_name || '';
                    document.getElementById('userDetailModalLastName').textContent = user.last_name || '';
                    document.getElementById('userDetailModalEmail').textContent = user.email || '';
                    document.getElementById('userDetailModalLocation').textContent = user.location_name || '';
                    document.getElementById('userDetailModalDescription').textContent = user.description || '';
                    // Set role badge
                    const roleBadge = document.getElementById('userDetailModalRole');
                    if (user.role) {
                        roleBadge.textContent = user.role;
                        roleBadge.className = 'badge ' + (user.role === 'admin' ? 'bg-warning' :
                            user.role === 'editor' ? 'bg-info' :
                            user.role === 'moderator' ? 'bg-success' :
                            user.role === 'traveller' ? 'bg-primary' : 'bg-danger');
                    } else {
                        roleBadge.textContent = 'Unknown';
                        roleBadge.className = 'badge bg-secondary';
                    }
                    // Set status badge
                    const statusBadge = document.getElementById('userDetailModalStatus');
                    if (user.status) {
                        statusBadge.textContent = user.status;
                        statusBadge.className = 'badge ' + (user.status === 'active' ? 'bg-black' : 'bg-danger');
                    } else {
                        statusBadge.textContent = 'Unknown';
                        statusBadge.className = 'badge bg-secondary';
                    }
                    // Set avatar
                    const avatarContainer = document.getElementById('userDetailModalAvatarContainer');
                    if (user.profile_image) {
                        avatarContainer.innerHTML = `
                            <div class="rounded-4 d-flex align-items-center justify-content-center border-0 overflow-hidden"
                                 style="width: 256px; height: 256px;">
                                <img src="/static/file/uploads/${user.profile_image}" alt="Avatar" class="w-100 h-auto">
                            </div>
                        `;
                    } else {
                        const avatarContent = user.first_name
                            ? user.first_name[0].toUpperCase()
                            : '<i class="bi bi-person fs-1"></i>';
                        avatarContainer.innerHTML = `
                            <div class="rounded-4 d-flex align-items-center justify-content-center border-0 text-secondary fs-1"
                                 style="width: 256px; height: 256px;">
                                ${avatarContent}
                            </div>
                        `;
                    }
                }
            });
            // Load subscription history when tab is shown
            document.getElementById('subscription-tab').addEventListener('shown.bs.tab', function () {
                if (currentUserId) loadSubscriptionHistory(currentUserId);
            });
        }
    });

    // Load subscription history for a user
    function loadSubscriptionHistory(userId) {
        console.log('Loading subscription history for user:', userId);

        apiRequest('/admin/user-subscription-history', 'POST', {user_id: userId})
            .then(data => {
                console.log('Subscription history data:', data);
                if (data.success) {
                    displaySubscriptionHistory(data.subscriptions);
                } else {
                    console.error('Failed to load subscription history:', data.error);
                    alert('Failed to load subscription history: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error loading subscription history:', error);
                alert('Error loading subscription history');
            });
    }

    // Render subscription history table
    function displaySubscriptionHistory(subscriptions) {
        const table = document.getElementById('subscriptionHistoryTable');
        table.innerHTML = '';
        subscriptions.forEach(sub => {
            console.log('Processing subscription:', sub);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${sub.plan_name || 'N/A'}</td>
                <td>${new Date(sub.start_date).toLocaleDateString()}</td>
                <td>${new Date(sub.end_date).toLocaleDateString()}</td>
                <td>$${sub.payment_amount || '0.00'}</td>
                <td>$${sub.gst_amount || '0.00'}</td>
                <td>${sub.billing_country || 'N/A'}</td>
                <td>${sub.is_free_trial ? 'Free Trial' : (sub.granted_by_admin ? 'Admin Granted' : 'Paid')}</td>
                <td>
                    <button class="btn btn-sm btn-outline-dark rounded-5"
                                onclick="showSubscriptionDetail(${sub.id})">
                            View
                        </button>
                </td>
            `;
            table.appendChild(row);
        });
    }
</script>
