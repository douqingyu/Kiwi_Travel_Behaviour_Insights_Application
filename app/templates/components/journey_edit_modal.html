<div class="modal fade" id="journeyEditModal{{ journey_id }}" tabindex="-1" aria-labelledby="journeyEditModalLabel{{ journey_id }}" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-black text-white border-0 rounded-top-4 px-4">
                <h5 class="modal-title" id="journeyEditModalLabel{{ journey_id }}">Edit Journey</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body border-0 p-4">
                <form id="journeyEditForm{{ journey_id }}">
                    <input type="hidden" id="journey_id{{ journey_id }}" value="{{ journey.id }}">
                    <div class="mb-3">
                        <label for="edit_title{{ journey_id }}" class="form-label text-secondary">Title</label>
                        <input type="text" class="form-control rounded-3 border-0 bg-body-secondary" id="edit_title{{ journey_id }}" name="journeyTitle"
                               value="{{ journey.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit_description{{ journey_id }}" class="form-label text-secondary">Description</label>
                        <textarea class="form-control rounded-3 border-0 bg-body-secondary" id="edit_description{{ journey_id }}" rows="3"
                                  required>{{ journey.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="edit_start_date{{ journey_id }}" class="form-label text-secondary">Start Date</label>
                        <input type="date" class="form-control rounded-3 border-0 bg-body-secondary" id="edit_start_date{{ journey_id }}"
                               value="{{ journey.start_date.strftime('%Y-%m-%d') }}" required placeholder="dd/mm/yyyy">
                    </div>
                    {% if session.get('role') in ['admin', 'editor'] and session.get('user_id') != journey.user_id %}
                    <div class="mb-3">
                        <label for="edit_reason{{ journey_id }}" class="form-label text-secondary">Edit Reason <span class="text-danger">*</span></label>
                        <textarea class="form-control rounded-3 border-0 bg-body-secondary" id="edit_reason{{ journey_id }}" rows="2"
                                  placeholder="Please provide a reason for your edit" required></textarea>
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label text-secondary">Journey Cover</label>
                        <div class="w-100">
                            <div id="imageUploadArea{{ journey_id }}"
                                 class="image-upload-area d-flex cursor-pointer align-items-center justify-content-center w-100 rounded-4 border border-secondary {% if journey.cover_photo %}d-none{% endif %}"
                                 style="aspect-ratio: 1; border-width: 2px !important; border-style: dashed !important;">
                                <input type="file" class="d-none" id="journeyImage{{ journey_id }}" name="journey_image"
                                       accept="image/*">
                                <div class="text-center text-secondary">
                                    <i class="bi bi-plus-circle-fill fs-1 mb-2 d-block text-secondary"></i>
                                    <span>Click to upload image</span>
                                </div>
                            </div>
                            <div id="imagePreview{{ journey_id }}" class="{% if not journey.cover_photo %}d-none{% endif %}">
                                <div class="position-relative" style="aspect-ratio: 1;">
                                    <img id="previewImage{{ journey_id }}" 
                                         src="{% if journey.cover_photo %}/static/file/uploads/{{ journey.cover_photo }}{% endif %}" 
                                         alt="Preview"
                                         class="img-fluid rounded-4 w-100 h-100" 
                                         style="object-fit: cover;">
                                    <button type="button" id="clearImageBtn{{ journey_id }}"
                                            class="btn position-absolute top-0 end-0 m-2 border-0 fs-6 rounded-5 d-flex align-items-center justify-content-center"
                                            style="width: 32px; height: 32px; background: rgba(90,90,90,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.2);"
                                            data-bs-toggle="tooltip"
                                            data-bs-placement="left"
                                            title="Remove">
                                        <i class="bi bi-x-lg text-white"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4">
                <button type="button" class="btn rounded-5 px-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-dark rounded-5 px-3" onclick="updateJourney({{ journey_id }})">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Convert yyyy-mm-dd format to dd/mm/yyyy for display
    function formatDateForDisplay(dateString) {
        if (!dateString) return '';
        const [year, month, day] = dateString.split('-');
        return `${day}/${month}/${year}`;
    }
    
    // Convert dd/mm/yyyy format to yyyy-mm-dd for submission
    function formatDateForSubmit(dateString) {
        if (!dateString) return '';
        if (dateString.includes('/')) {
            const [day, month, year] = dateString.split('/');
            return `${year}-${month}-${day}`;
        }
        return dateString;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('journeyEditModal{{ journey_id }}');
        const form = document.getElementById('journeyEditForm{{ journey_id }}');
        
        const inputs = form.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', function(e) {
                e.stopPropagation();
            });
        });

        modal.addEventListener('hide.bs.modal', function(e) {
            const isCloseButton = e.target.classList.contains('btn-close') || e.target.closest('.btn-close');
            const isCancelButton = e.target.classList.contains('btn') && e.target.textContent.trim() === 'Cancel';
            const isSaveButton = e.target.classList.contains('btn') && e.target.textContent.trim() === 'Save';
            
            if (!isCloseButton && !isCancelButton && !isSaveButton) {
                e.preventDefault();
            }
        });

        modal.querySelector('.modal-content').addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });

    function updateJourney(journeyId) {
        const title = document.getElementById('edit_title' + journeyId).value;
        const description = document.getElementById('edit_description' + journeyId).value;
        const startDateInput = document.getElementById('edit_start_date' + journeyId);
        let startDate = startDateInput.value;
        const previewImage = document.getElementById('previewImage' + journeyId);
        
        // Check if it's in NZ format and convert if necessary
        if (startDate && startDate.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
            startDate = formatDateForSubmit(startDate);
        }

        const requestData = {
            journey_id: journeyId,
            title: title,
            description: description,
            start_date: startDate,
            photo_url: previewImage.src && previewImage.src.includes('/static/file/uploads/') ? previewImage.src.split('/').pop() : null,
            is_photo_deleted: document.getElementById('imagePreview' + journeyId).classList.contains('d-none')
        };

        // Only add to the request data when the edit_reason input field exists and has a value
        const editReasonInput = document.getElementById('edit_reason' + journeyId);
        if (editReasonInput && editReasonInput.value.trim()) {
            requestData.edit_reason = editReasonInput.value.trim();
        }

        apiRequest('/journey/update', 'POST', requestData)
            .then(data => {
                const modal = document.getElementById('journeyEditModal' + journeyId);
                const bsModal = bootstrap.Modal.getInstance(modal);
                bsModal.hide();

                // show successful message
                showMessage('Journey updated successfully', 'success');
                
                setTimeout(() => {
                    window.location.reload();
                }, 600);
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage(error.message || 'Update failed', 'error');
            });
    }
    
    // Add event listeners to all date input fields
    document.addEventListener('DOMContentLoaded', function() {
        const dateInputs = document.querySelectorAll('input[type="date"]');
        dateInputs.forEach(input => {
            // Support user input in dd/mm/yyyy format
            input.addEventListener('blur', function(e) {
                const dateValue = e.target.value;
                if (dateValue && dateValue.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                    // Convert dd/mm/yyyy to yyyy-mm-dd
                    const [day, month, year] = dateValue.split('/');
                    e.target.value = `${year}-${month}-${day}`;
                }
            });
        });
    });

    // Handle images upload and preview
    document.addEventListener('DOMContentLoaded', function() {
        const journeyId = {{ journey_id }};
        const imageUploadArea = document.getElementById('imageUploadArea' + journeyId);
        const fileInput = document.getElementById('journeyImage' + journeyId);
        const previewDiv = document.getElementById('imagePreview' + journeyId);
        const previewImage = document.getElementById('previewImage' + journeyId);

        imageUploadArea.addEventListener('click', function () {
            fileInput.click();
        });

        fileInput.addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // Check file type
            const allowedTypes = ['image/jpg', 'image/jpeg', 'image/png'];
            if (!allowedTypes.includes(file.type)) {
                showMessage('Please upload a .jpg, .jpeg, or .png file', 'error');
                return;
            }

            // Check file size (2MB limit)
            if (file.size > 2 * 1024 * 1024) {
                showMessage('File size must be less than 2MB', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('{{ url_for("upload_journey_photo") }}', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                if (data.success && data.filename) {
                    previewImage.src = `/static/file/uploads/${data.filename}`;
                    previewDiv.classList.remove('d-none');
                    imageUploadArea.classList.add('d-none');
                } else {
                    showMessage(data.error || 'Failed to upload images', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showMessage('Failed to upload images: ' + error.message, 'error');
            }
        });

        // Handle clear images button click event
        document.getElementById('clearImageBtn' + journeyId).addEventListener('click', function () {
            previewImage.src = '';
            previewDiv.classList.add('d-none');
            imageUploadArea.classList.remove('d-none');
            fileInput.value = '';
        });
    });
</script>

<style>
    .image-upload-area:hover {
        border-color: var(--bs-black);
        background-color: var(--bs-dark-bg-subtle);
    }
</style>
