<div class="modal fade" id="helpSubmitModal" tabindex="-1" aria-labelledby="helpSubmitModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="helpSubmitModalLabel">Submit Help Request</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="helpSubmitForm" method="POST" action="{{ url_for('create_help_request') }}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="helpTitle" class="form-label">Title</label>
                        <input type="text" class="form-control" id="helpTitle" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="helpCategory" class="form-label">Category</label>
                        <select class="form-select" id="helpCategory" name="category" required>
                            <option value="">Select a category</option>
                            <option value="technical">Technical Issue</option>
                            <option value="account">Account Related</option>
                            <option value="content">Content Issue</option>
                            <option value="bug">Bug Report</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3 bug-report-fields" style="display: none;">
                        <label for="bugSteps" class="form-label">Steps to Reproduce</label>
                        <textarea class="form-control" id="bugSteps" name="steps" rows="3"></textarea>
                    </div>
                    <div class="mb-3 bug-report-fields" style="display: none;">
                        <label for="expectedBehavior" class="form-label">Expected Behavior</label>
                        <textarea class="form-control" id="expectedBehavior" name="expected_behavior" rows="2"></textarea>
                    </div>
                    <div class="mb-3 bug-report-fields" style="display: none;">
                        <label for="actualBehavior" class="form-label">Actual Behavior</label>
                        <textarea class="form-control" id="actualBehavior" name="actual_behavior" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="helpDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="helpDescription" name="content" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="helpAttachments" class="form-label">Attachments</label>
                        <input type="file" class="form-control" id="helpAttachments" name="attachments" multiple accept="image/*,.pdf,.doc,.docx">
                        <small class="form-text text-muted">You can upload images, PDFs, or Word documents. Maximum file size: 5MB</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('helpCategory').addEventListener('change', function() {
    const bugFields = document.querySelectorAll('.bug-report-fields');
    if (this.value === 'bug') {
        bugFields.forEach(field => field.style.display = 'block');
    } else {
        bugFields.forEach(field => field.style.display = 'none');
    }
});

document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('helpSubmitForm');
    if (form) {
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    // 成功逻辑
                    alert('Help request submitted successfully!');
                    window.location.reload();
                } else {
                    alert(data.error || data.message || 'Failed to submit help request');
                }
            } catch (error) {
                alert('Network error or server error');
            }
        });
    }
});
</script>
