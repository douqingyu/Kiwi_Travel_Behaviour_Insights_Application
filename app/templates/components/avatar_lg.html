{# common avatar component (large) #}
{% if profile_image %}
    <div class="d-flex align-items-center justify-content-center overflow-hidden rounded-4"
         style="width: {{ size }}px; height: {{ size }}px;">
        {% if show_avatar_modal %}
            <a href="{{ url_for('view_profile', user_id=user_id) }}" title="View profile">
                <img src="{{ url_for('static', filename='file/uploads/' + profile_image) }}" alt="Avatar"
                     style="width: 100%; height: 100%; object-fit: cover;">
            </a>
        {% else %}
            <img src="{{ url_for('static', filename='file/uploads/' + profile_image) }}" alt="Avatar"
                 style="width: 100%; height: 100%; object-fit: cover;">
        {% endif %}
    </div>
{% else %}
    <div class="rounded-4 text-black d-flex align-items-center justify-content-center border-0"
         style="width: {{ size }}px; height: {{ size }}px; background-color: var(--bs-dark-bg-subtle)">
        {% if first_name %}
            <a href="{{ url_for('view_profile', user_id=user_id) }}" class="text-decoration-none text-black">
                <span class="fs-4">{{ first_name[0].upper() }}</span>
            </a>
        {% else %}
            <a href="{{ url_for('view_profile', user_id=user_id) }}" class="text-decoration-none text-black">
                <i class="bi bi-person" style="font-size: {{ size / 2 }}px;"></i>
            </a>
        {% endif %}
    </div>
{% endif %}

<!-- Modal: Display when the avatar onclick -->
<div class="modal fade" id="avatarModal" tabindex="-1" aria-labelledby="avatarModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-5 position-relative">
            <div class="modal-body text-center">
                <button type="button"
                        class="btn-close position-absolute top-0 start-100 translate-middle btn-close-white rounded-circle p-2"
                        data-bs-dismiss="modal" aria-label="Close">
                </button>

                {% if profile_image %}
                    <img src="{{ url_for('static', filename='file/uploads/' + profile_image) }}" alt="Avatar"
                         class="img-fluid rounded-4">
                {% endif %}
            </div>
        </div>
    </div>
</div>
